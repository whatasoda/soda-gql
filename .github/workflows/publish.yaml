name: Publish to npm

on:
  release:
    types: [published]

jobs:
  check-publishable:
    runs-on: ubuntu-latest
    outputs:
      can_publish: ${{ steps.check.outputs.can_publish }}
      all_packages: ${{ steps.packages.outputs.all_packages }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: |
            packages/*/package.json
          sparse-checkout-cone-mode: false

      - name: Collect public packages
        id: packages
        run: |
          PACKAGES=()
          for pkg_json in packages/*/package.json; do
            if [ -f "$pkg_json" ]; then
              IS_PRIVATE=$(jq -r '.private // false' "$pkg_json")
              ACTUAL_NAME=$(jq -r '.name' "$pkg_json")
              # Only include @soda-gql/-scoped public packages (skip non-scoped like vscode extension)
              if [ "$IS_PRIVATE" = "false" ] && [[ "$ACTUAL_NAME" == @soda-gql/* ]]; then
                PKG_NAME=$(basename "$(dirname "$pkg_json")")
                PACKAGES+=("$PKG_NAME")
              fi
            fi
          done
          echo "Found public packages: ${PACKAGES[*]}"
          echo "packages=${PACKAGES[*]}" >> $GITHUB_OUTPUT

          # Combine with platform packages for dist reconciliation
          PLATFORM_PACKAGES=(
            "swc-darwin-arm64"
            "swc-darwin-x64"
            "swc-linux-x64-gnu"
            "swc-linux-x64-musl"
            "swc-win32-x64-msvc"
          )
          ALL=("${PACKAGES[@]}" "${PLATFORM_PACKAGES[@]}")
          ALL_JSON=$(printf '%s\n' "${ALL[@]}" | jq -R . | jq -sc .)
          echo "all_packages=${ALL_JSON}" >> $GITHUB_OUTPUT

      - name: Check npm registry
        id: check
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          # Get packages from previous step
          read -ra PACKAGES <<< "${{ steps.packages.outputs.packages }}"

          # Platform-specific packages (checked separately)
          PLATFORM_PACKAGES=(
            "swc-darwin-arm64"
            "swc-darwin-x64"
            "swc-linux-x64-gnu"
            "swc-linux-x64-musl"
            "swc-win32-x64-msvc"
          )

          ALL_PUBLISHED=true
          ANY_NEW=false

          echo "Checking packages for version ${VERSION}..."

          for pkg in "${PACKAGES[@]}" "${PLATFORM_PACKAGES[@]}"; do
            if npm view "@soda-gql/${pkg}@${VERSION}" version 2>/dev/null; then
              echo "✓ @soda-gql/${pkg}@${VERSION} is already published"
            else
              echo "✗ @soda-gql/${pkg}@${VERSION} is NOT published"
              ALL_PUBLISHED=false

              # Check if package has ever been published
              if ! npm view "@soda-gql/${pkg}" versions 2>/dev/null; then
                echo "  → This package has NEVER been published (needs OTP)"
                ANY_NEW=true
              fi
            fi
          done

          if [ "$ALL_PUBLISHED" = "true" ]; then
            echo "can_publish=skip" >> $GITHUB_OUTPUT
            echo ""
            echo "=== All packages already published. Nothing to do. ==="
          elif [ "$ANY_NEW" = "true" ]; then
            echo "can_publish=local" >> $GITHUB_OUTPUT
            echo ""
            echo "=== Some packages need initial publish with OTP. ==="
            echo "=== Please run locally: bun publish-local ${{ github.event.release.tag_name }} --otp <code> ==="
          else
            echo "can_publish=ci" >> $GITHUB_OUTPUT
            echo ""
            echo "=== All packages can be published via CI. ==="
          fi

  publish:
    needs: check-publishable
    if: needs.check-publishable.outputs.can_publish == 'ci'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          gh release download "${VERSION}" --repo "${{ github.repository }}" --pattern "publish-packages-*.tar.gz"
          mkdir -p dist
          tar -xzf publish-packages-*.tar.gz -C dist

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6
        with:
          node-version: "24.12.0"
          registry-url: "https://registry.npmjs.org"

      - name: Reconcile dist packages
        run: |
          ALL_JSON='${{ needs.check-publishable.outputs.all_packages }}'
          readarray -t EXPECTED < <(echo "$ALL_JSON" | jq -r '.[]')

          if [ ${#EXPECTED[@]} -eq 0 ]; then
            echo "::error::Expected package list is empty"
            exit 1
          fi

          ACTUAL=()
          for dir in dist/*/; do
            [ -d "$dir" ] || continue
            ACTUAL+=("$(basename "$dir")")
          done

          MISSING=()
          for expected in "${EXPECTED[@]}"; do
            FOUND=false
            for actual in "${ACTUAL[@]}"; do
              [ "$expected" = "$actual" ] && FOUND=true && break
            done
            [ "$FOUND" = "false" ] && MISSING+=("$expected")
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing packages in dist: ${MISSING[*]}"
            exit 1
          fi

          UNEXPECTED=()
          for actual in "${ACTUAL[@]}"; do
            FOUND=false
            for expected in "${EXPECTED[@]}"; do
              [ "$actual" = "$expected" ] && FOUND=true && break
            done
            [ "$FOUND" = "false" ] && UNEXPECTED+=("$actual")
          done

          if [ ${#UNEXPECTED[@]} -gt 0 ]; then
            echo "::error::Unexpected packages in dist: ${UNEXPECTED[*]}"
            exit 1
          fi

          echo "Dist reconciliation passed: ${#ACTUAL[@]} packages"

      - name: Publish to npm
        run: |
          for dir in dist/*/; do
            PKG_NAME=$(jq -r '.name' "${dir}package.json")
            PKG_VERSION=$(jq -r '.version' "${dir}package.json")

            # Skip non-scoped packages (e.g., vscode extension has separate distribution)
            if [[ "$PKG_NAME" != @soda-gql/* ]]; then
              # Fail on unknown non-scoped packages; only whitelisted ones are expected
              KNOWN_NON_SCOPED=("soda-gql-vscode-extension")
              KNOWN=false
              for known in "${KNOWN_NON_SCOPED[@]}"; do
                if [ "$PKG_NAME" = "$known" ]; then KNOWN=true; break; fi
              done
              if [ "$KNOWN" = "true" ]; then
                echo "Skipping whitelisted non-scoped package ${PKG_NAME}"
                continue
              else
                echo "::error::Unknown non-scoped package in dist: ${PKG_NAME}"
                exit 1
              fi
            fi

            # Skip if already published
            if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
              echo "Skipping ${PKG_NAME}@${PKG_VERSION} (already published)"
              continue
            fi

            echo "Publishing ${PKG_NAME}@${PKG_VERSION}..."
            cd "$dir"
            npm publish --access public --provenance
            cd -
          done

  publish-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
        with:
          bun-version-file: .bun-version

      - run: bun install --frozen-lockfile

      - name: Publish to VS Code Marketplace
        working-directory: packages/vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: bunx vsce publish --no-dependencies --pre-release -p "$VSCE_PAT"

  notify-local-required:
    needs: check-publishable
    if: needs.check-publishable.outputs.can_publish == 'local'
    runs-on: ubuntu-latest
    steps:
      - name: Notify local publish required
        run: |
          echo "::warning::Some packages require initial publish with OTP"
          echo "::warning::Please run locally: bun publish-local ${{ github.event.release.tag_name }} --otp <code>"
          exit 0
