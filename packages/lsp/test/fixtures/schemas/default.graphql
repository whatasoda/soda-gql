type Query {
  user(id: ID!): User
  users: [User!]!
  search(query: String!): [SearchResult!]!
}

type User {
  id: ID!
  name: String!
  email: String
  posts: [Post!]!
}

type Post {
  id: ID!
  title: String!
  body: String!
  author: User!
}

input CreateUserInput {
  name: String!
  email: String
}

enum UserRole {
  ADMIN
  USER
  GUEST
}

union SearchResult = User | Post
