schema {
  query: Query
}

type Query {
  user(id: ID!): User
  users(limit: Int): [User!]!
  searchUsers(filter: UserFilter!): [User!]!
  usersByIds(ids: [ID!]!, tags: [String!]): [User!]!
}

input AddressInput {
  city: String!
}

input UserFilter {
  name: String!
  minAge: Int
  address: AddressInput
}

type User {
  id: ID!
  name: String!
  email: String
}
